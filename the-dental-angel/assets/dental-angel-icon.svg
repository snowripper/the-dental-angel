  <ellipse cx="512" cy="175" rx="120" ry="30" stroke="#FFD700" stroke-width="9" fill="none" opacity="0.7"/>

  <!-- Left Wing (pointing DOWN) -->
  <path d="M280 420
           C240 420 200 440 170 480
           C140 520 120 580 130 650
           C140 720 170 780 200 820
           C220 845 250 860 270 850
           C290 840 295 810 290 770
           C285 730 290 690 310 660
           C330 630 350 620 350 600
           C350 570 330 540 310 520
           C290 500 280 480 290 460
           C300 440 320 430 320 420
           C320 410 300 420 280 420Z"
        fill="white"
        stroke="#A7D3F3"
        stroke-width="6"/>

  <!-- Left wing feather details -->
  <path d="M200 550 C220 560 230 600 220 640" stroke="#C5E4F7" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M240 520 C260 540 270 590 255 640" stroke="#C5E4F7" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M170 620 C190 640 200 700 185 760" stroke="#C5E4F7" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Right Wing (pointing DOWN) -->
  <path d="M744 420
