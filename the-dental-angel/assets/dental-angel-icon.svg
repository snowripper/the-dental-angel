           C499 770 484 793 464 800
           C434 810 404 790 384 760
           C359 720 349 660 344 600
           C334 500 340 400 340 340Z"
        fill="white"
        stroke="#6BB3D9"
        stroke-width="12"/>

  <!-- Molar cusps (bumpy top) - 4 rounded bumps -->
  <ellipse cx="400" cy="280" rx="45" ry="35" fill="white" stroke="#6BB3D9" stroke-width="8"/>
  <ellipse cx="512" cy="270" rx="50" ry="40" fill="white" stroke="#6BB3D9" stroke-width="8"/>
  <ellipse cx="624" cy="280" rx="45" ry="35" fill="white" stroke="#6BB3D9" stroke-width="8"/>

  <!-- Fill gaps between cusps -->
  <rect x="355" y="280" width="314" height="60" fill="white"/>
  <path d="M355 300 L355 340 C355 340 400 350 512 350 C624 350 669 340 669 340 L669 300" fill="white"/>

  <!-- Cusp highlights -->
  <ellipse cx="395" cy="275" rx="20" ry="15" fill="#F0F9FF" opacity="0.7"/>
  <ellipse cx="505" cy="265" rx="22" ry="17" fill="#F0F9FF" opacity="0.7"/>
  <ellipse cx="618" cy="275" rx="20" ry="15" fill="#F0F9FF" opacity="0.7"/>

  <!-- Tooth body highlight (shine) -->
  <ellipse cx="390" cy="480" rx="40" ry="70" fill="#F0F9FF" opacity="0.6"/>

  <!-- Left eye - big cute style -->
  <ellipse cx="420" cy="500" rx="38" ry="44" fill="#4A5568"/>
  <ellipse cx="430" cy="488" rx="14" ry="17" fill="white"/>
  <ellipse cx="436" cy="495" rx="6" ry="7" fill="white" opacity="0.6"/>

  <!-- Right eye - big cute style -->
  <ellipse cx="604" cy="500" rx="38" ry="44" fill="#4A5568"/>
  <ellipse cx="614" cy="488" rx="14" ry="17" fill="white"/>
  <ellipse cx="620" cy="495" rx="6" ry="7" fill="white" opacity="0.6"/>

  <!-- Cute smile -->
  <path d="M420 620 Q512 720 604 620"
        stroke="#4A5568"
        stroke-width="14"
        stroke-linecap="round"
        fill="none"/>

  <!-- Rosy cheeks -->
  <ellipse cx="355" cy="580" rx="35" ry="24" fill="#FECACA" opacity="0.5"/>
  <ellipse cx="669" cy="580" rx="35" ry="24" fill="#FECACA" opacity="0.5"/>

  <!-- Subtle shadow under tooth -->
  <ellipse cx="512" cy="850" rx="170" ry="30" fill="#6BB3D9" opacity="0.12"/>
</svg>
