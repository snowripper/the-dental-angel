  <!-- Right wing feather details -->
  <path d="M824 550 C804 560 794 600 804 640" stroke="#C5E4F7" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M784 520 C764 540 754 590 769 640" stroke="#C5E4F7" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M854 620 C834 640 824 700 839 760" stroke="#C5E4F7" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Molar tooth body - cute rounded square shape with bumpy top -->
  <path d="M340 340
